name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  platform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: career_agent_platform
    env:
      PYTHONPATH: ${{ github.workspace }}/career_agent_platform
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Platform pytest suite
        run: python -m pytest tests -q --tb=short

      - name: Golden snapshot regression
        run: python -m pytest tests/test_golden_recommendations.py -q --tb=short

      - name: Demo mode guards
        env:
          CAREER_AGENT_DEMO_MODE: "1"
        run: python -m pytest tests/test_demo_mode.py -q --tb=short

      - name: Golden snapshot generator determinism
        run: |
          python evaluation/golden/generate_golden_snapshots.py
          git diff --exit-code evaluation/golden/ || (
            echo "Golden snapshots changed after regeneration — commit updated files or fix nondeterminism"
            exit 1
          )

      - name: Repo hygiene — no runtime persistence JSON
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          if git ls-files 'career_agent_platform/applications/data/**/*.json' \
            | grep -v '.gitkeep' | grep -q .; then
            echo "Runtime JSON committed under applications/data/"
            git ls-files 'career_agent_platform/applications/data/**/*.json'
            exit 1
          fi
          if git ls-files 'career_agent_platform/data/resumes/*.json' \
            | grep -v '.gitkeep' | grep -q .; then
            echo "Runtime resume JSON committed under data/resumes/"
            git ls-files 'career_agent_platform/data/resumes/*.json'
            exit 1
          fi

      - name: Engine pytest (benchmark drift excluded)
        working-directory: ${{ github.workspace }}
        run: |
          python -m pytest career_intelligence_engine/tests \
            --ignore=career_intelligence_engine/tests/test_benchmark_rankings.py \
            -k "not test_top_ranked_are_program_cluster" \
            -q --tb=short

      - name: Generate public demo artifacts
        run: python demo/generate_public_snapshots.py

      - name: Validate demo artifact outputs
        run: |
          test -f demo/public/sample_resume.txt
          test -f demo/public/sample_recommendations.json
          python -c "
          import json
          from pathlib import Path
          p = Path('demo/public/sample_recommendations.json')
          data = json.loads(p.read_text(encoding='utf-8'))
          recs = data.get('recommendations') or []
          assert len(recs) >= 1, 'expected at least one recommendation'
          for r in recs:
              assert 'job_id' in r and 'overall_match' in r
          "

      - name: Import and startup smoke
        run: |
          python -c "
          import Home  # noqa: F401
          from recommendation_engine import RecommendationEngine
          from evaluation.recommendation_snapshot import capture_snapshot
          from monitoring.reliability_signals import log_recommendation_run_signals
          from demo_mode import is_demo_mode
          engine = RecommendationEngine()
          assert engine is not None
          assert is_demo_mode() is False
          "

      - name: Demo mode startup smoke
        env:
          CAREER_AGENT_DEMO_MODE: "1"
        run: |
          python -c "
          import Home  # noqa: F401
          from demo_mode import is_demo_mode, persistence_writes_enabled
          assert is_demo_mode()
          assert not persistence_writes_enabled()
          "
