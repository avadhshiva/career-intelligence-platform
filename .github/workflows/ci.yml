name: CI

on:
push:
branches: [main, master]
pull_request:
branches: [main, master]

jobs:
platform:
runs-on: ubuntu-latest
defaults:
run:
working-directory: career_agent_platform

```
env:
  PYTHONPATH: ${{ github.workspace }}/career_agent_platform

steps:
  - uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"
      cache: pip

  - name: Install dependencies
    working-directory: ${{ github.workspace }}
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Platform pytest suite
    run: python -m pytest tests -q --tb=short

  - name: Golden snapshot regression
    run: python -m pytest tests/test_golden_recommendations.py -q --tb=short

  - name: Demo mode guards
    env:
      CAREER_AGENT_DEMO_MODE: "1"
    run: python -m pytest tests/test_demo_mode.py -q --tb=short

  - name: Debug ontology version
    run: python -c "from career_intelligence_engine.ontology.version import get_ontology_version; print('ONTOLOGY_VERSION=', get_ontology_version())"

  - name: Golden snapshot generator determinism
    run: |
      python evaluation/golden/generate_golden_snapshots.py
      git diff --exit-code evaluation/golden/ || (
        echo 'Golden snapshots changed after regeneration - commit updated files or fix nondeterminism'
        exit 1
      )

  - name: Repo hygiene — no runtime persistence JSON
    working-directory: ${{ github.workspace }}
    run: |
      set -e
      if git ls-files 'career_agent_platform/applications/data/**/*.json' \
        | grep -v '.gitkeep' | grep -q .; then
        echo "Runtime JSON committed under applications/data/"
        git ls-files 'career_agent_platform/applications/data/**/*.json'
        exit 1
      fi

      if git ls-files 'career_agent_platform/data/resumes/*.json' \
        | grep -v '.gitkeep' | grep -q .; then
        echo "Runtime resume JSON committed under data/resumes/"
        git ls-files 'career_agent_platform/data/resumes/*.json'
        exit 1
      fi